<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sushi Demure | Manager Complaints</title>
  <link rel="icon" type="image/jpeg" href="img/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --dark:   #0f1f17;
      --dark-2: #162b1e;
      --green:  #1e3d2a;
      --pink:   #f2b8c6;
      --cream:  #f8f2ea;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--dark); color: var(--cream); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: rgba(242,184,198,0.3); border-radius: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::placeholder { color: rgba(248,242,234,0.35); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="js/manager/auth.config.js"></script>
  <script type="text/babel" src="js/manager/ComplaintsManager.jsx"></script>
</body>
</html>
